<!DOCTYPE html>
<html>
    <head>
        <title>Movie Watchlist</title>
        <!-- CSS STYLE SHEET -->
        <link rel="stylesheet" href="index.css"> 

        <!-- GOOGLE FONT -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 
    
        <!-- FONT AWESOME -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    </head>
    <body>
        <header>
            <div class="heading-and-input-container">
                <div class="heading-container">
                    <p>Find your film</p>
                    <a href="../watchlist/watchlist.html">My Watchlist</a>
                </div>
                <div class="input-field-container">
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search for a movie"
                    >
                    <button class="search-btn" id="search-btn">Search</button>
                </div>
            </div>
        </header>
        <main>
            <section class="movie-list-container" id="movie-list-container">
                <!-- MOVIE LIST HERE -->
            </section>
            <div class="home-initial-state" id="home-initial-state">
                <img src="../images/home-initial-icon.svg" alt="film reel icon">
                <p>Start exploring</p>
            </div>
        </main>
        <script src="index.js" type="module"></script>
    </body>
</html>
