<!DOCTYPE html>
<html>
    <head>
        <title>Movie Watchlist</title>
        <!-- CSS STYLE SHEET -->
        <link rel="stylesheet" href="index.css"> 

        <!-- GOOGLE FONT -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 
    </head>
    <body>
        <header>
            <div class="heading-and-input-container">
                <div class="heading-container">
                    <p>Find your film</p>
                    <a href="../watchlist/watchlist.html">My Watchlist</a>
                </div>
                <div class="input-field-container">
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search for a movie"
                    >
                    <button class="search-btn" id="search-btn">Search</button>
                </div>
            </div>
        </header>
        <main>
            <section class="movie-list-container" id="movie-list-container">
                <div class="movie-card">
                    <img src="../images/image-33.png" alt="" class="movie-poster">
                    <div class="movie-details-container">
                        <div class="movie-header">
                            <p class="title">Blade Runner</p>
                            <p class="rating">&#11088 8.1</p>
                        </div>
                        <div class="movie-detail">
                            <p>117 min</p>
                            <p>Action, Drama, Sci-fi</p>
                            <button class="watchlist-btn">
                                <img src="../images/plus-icon.svg" alt="plus icon">
                                Watchlist
                            </button>
                        </div>
                        <p class="about-movie">
                            A blade runner must pursue and terminate four replicants
                            who stole a ship in space, and have returned to Earth to 
                            find their creator.
                        </p>
                    </div>
                </div>
                <hr>
            </section>
            <div class="home-initial-state">
                <img src="../images/home-initial-icon.svg" alt="film reel icon">
                <p>Start exploring</p>
            </div>
        </main>
        <script src="index.js" type="module"></script>
    </body>
</html>
